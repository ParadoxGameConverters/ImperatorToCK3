l_russian:
 ENABLED: "Включено"
 DISABLED: "Отключено"

 STATIC_DEJURE: "Нужна ли динамическая де-юре карта королевств и империй?"
 STATIC_DEJURE_TIP: "Рекомендуется динамический режим. В динамическом режиме де-юре королевства и империи не сохраняются из ванильного CK3 и создаются на основе губернаторств Imperator. В статическом режиме де-юре королевства и империи определяются файлом конфигурации."
 STATIC_DEJURE_DYNAMIC: "Динамический"
 STATIC_DEJURE_DYNAMIC_TIP: "Определять де-юре титулы CK3 по губернаторствам Imperator."
 STATIC_DEJURE_STATIC: "Статический"
 STATIC_DEJURE_STATIC_TIP: "Предопределить де-юре титулы CK3 в основном по ванильному CK3 с историческими поправками."

 FILLER_DUKES: "Звание правителей, создаваемых для незанятых областей"
 FILLER_DUKES_TIP: "Если в истории у области нет правителя, она будет передана правителю этого ранга."
 FILLER_DUKES_COUNT: "Граф"
 FILLER_DUKES_COUNT_TIP: "Конвертер сгенерирует графов для незанятых областей."
 FILLER_DUKES_DUKE: "Герцог"
 FILLER_DUKES_DUKE_TIP: "Конвертер сгенерирует герцогов для незанятых областей."

 USE_CK3_FLAGS: "Использовать гербы CK3, если возможно?"
 USE_CK3_FLAGS_TIP: "Следует ли использовать гербы CK3 для стран, сопоставленных существующим титулам CK3."
 USE_CK3_FLAGS_NO: "Нет"
 USE_CK3_FLAGS_NO_TIP: "Конвертер будет использовать гербы Imperator для всех стран."
 USE_CK3_FLAGS_YES: "Да"
 USE_CK3_FLAGS_YES_TIP: "Конвертер будет использовать гербы CK3 для стран, сопоставленных существующим титулам CK3."

 HERESIES_IN_HISTORICAL_AREAS: "Использовать ли исторические ереси при конверсии?"
 HERESIES_IN_HISTORICAL_AREAS_TIP: "Эта опция конвертирует некоторые христианские и манихейские популяции, если они есть в вашей игре, в определённых областях карты Imperator: Rome в гностические, дуалистические или исторические христианские ереси на соответствующих территориях карты Crusader Kings III. Например, провинции с большинством христиан или манихеев в I:R могут быть преобразованы в прециллианство в CK3."
 HERESIES_IN_HISTORICAL_AREAS_YES: "Да"
 HERESIES_IN_HISTORICAL_AREAS_NO: "Нет"

 IMPERATOR_CURRENCY_RATE: "Курс валюты Imperator"
 IMPERATOR_CURRENCY_RATE_TIP: "Сколько золота CK3 должна стоить 1 единица золота Imperator?"
 IMPERATOR_CURRENCY_RATE_INPUT_TIP: "Используйте точку в качестве десятичного разделителя."

 IMPERATOR_CIVILIZATION_WORTH: "Ценность цивилизации Imperator"
 IMPERATOR_CIVILIZATION_WORTH_TIP: "Сколько развития CK3 должна давать 1 единица цивилизации Imperator?"
 IMPERATOR_CIVILIZATION_WORTH_INPUT_TIP: "Используйте точку в качестве десятичного разделителя."

 LEGION_CONVERSION: "[EXPERIMENTAL] Как импортировать легионы в CK3?"
 LEGION_CONVERSION_NO: "Не конвертировать."
 LEGION_CONVERSION_SPECIAL: "Как особые войска."
 LEGION_CONVERSION_MAA: "[ЛОМАНИЕ МУЛЬТИПЛЕЕРА] Как МАА."

 #CONVERTCHARACTERBIRTHANDDEATHDATES: "База для конверсии дат рождения персонажей"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_TIP: "Даты рождения персонажей могут основываться либо на их датах рождения в Imperator, либо на их возрасте."
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1: "Дата рождения"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1_TIP: "Рекомендуется, если вы конвертируете без большого временного разрыва."
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2: "Возраст"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2_TIP: "Рекомендуется, если вы конвертируете значительно раньше даты закладки CK3."

 MODNAME: "Имя выходного мода (необязательно):"
 MODNAMETIP: "Пожалуйста, используйте латинские буквы."
 MODNAMETIP2: "Необязательное имя для конвертированного мода (по умолчанию используется имя сохранения)."

 BOOKMARKDATE: "Дата закладки CK3 (н. э., необязательно)"
 BOOKMARKDATETIP: "Дата закладки CK3 в системе Anno Domini не может быть раньше даты сохранения Imperator. Оставьте пустым, чтобы использовать текущую дату из сохранения Imperator."
 BOOKMARKDATETIP2: "Дата закладки CK3 в системе Anno Domini не может быть раньше даты сохранения Imperator. Оставьте пустым, чтобы использовать текущую дату из сохранения Imperator."

 SKIP_DYNAMIC_COA_EXTRACTION: "Пропустить извлечение сгенерированных гербов?"
 SKIP_DYNAMIC_COA_EXTRACTION_TIP: "Следует ли запускать Imperator для автоматического извлечения всех сгенерированных в игре флагов."
 SKIP_DYNAMIC_COA_EXTRACTION_NO: "Нет"
 SKIP_DYNAMIC_COA_EXTRACTION_NO_TIP: "Конвертер запустит Imperator и извлечёт все сгенерированные флаги."
 SKIP_DYNAMIC_COA_EXTRACTION_YES: "Да"
 SKIP_DYNAMIC_COA_EXTRACTION_YES_TIP: "Конвертер не будет запускать Imperator для извлечения сгенерированных флагов."

 SKIP_HOLDING_OWNERS_IMPORT: "Пропустить импорт владельцев владений?"
 SKIP_HOLDING_OWNERS_IMPORT_TIP: "Следует ли импортировать владельцев владений Imperator как баронов и графов."
 SKIP_HOLDING_OWNERS_IMPORT_NO: "Нет"
 SKIP_HOLDING_OWNERS_IMPORT_NO_TIP: "Конвертер импортирует владельцев как баронов и графов."
 SKIP_HOLDING_OWNERS_IMPORT_YES: "Да"
 SKIP_HOLDING_OWNERS_IMPORT_YES_TIP: "Конвертер не будет импортировать владельцев как баронов и графов."

 FILLER_GOVERNMENTS: "Тип правления для правителей-заполнителей"
 FILLER_GOVERNMENTS_TIP: "(На данный момент эта опция определяет лишь то, какие правители-заполнители должны получить статус кочевников, поэтому для её срабатывания требуется наличие дополнения „Ханы степей“). Какой тип правления должен быть у правителей-заполнителей, создаваемых конвертером? По умолчанию правители-заполнители начинают игру с племенным типом правления."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL: "Степные кочевники — Все"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL_TIP: "Все правители-заполнители в Степном регионе получают статус кочевников."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE: "Степные кочевники — По наследию"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE_TIP: "Правители-заполнители в Степном регионе получают статус кочевников, если они обладают одним из следующих культурных наследий: \n— Иранское\n— Монгольское\n— Тюркское\n— Мадьярское\n— Угро-пермское."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD: "Степные кочевники — Вожди стад"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD_TIP: "Правители-заполнители в Степи становятся кочевниками, если статус главы их культуры определяется размером стада."
 FILLER_GOVERNMENTS_ALL_NOMADS: "Все кочевники"
 FILLER_GOVERNMENTS_ALL_NOMADS_TIP: "Все правители-заполнители становятся кочевниками.\n\nПРИМЕЧАНИЕ: Кочевники не могут мигрировать, если не участвуют в событии, которое это позволяет — например, в ситуации «Великая Степь»!"
 FILLER_GOVERNMENTS_NO_CHANGES: "Без изменений"
 FILLER_GOVERNMENTS_NO_CHANGES_TIP: "Правители-заполнители никак не изменяются; используются данные, полученные непосредственно от конвертера."

 IMPERATOR_NOMADS: "Императорские кочевники"
 IMPERATOR_NOMADS_TIP: "(Требуется наличие дополнения «Ханы степей» для вступления в силу) Как следует обрабатывать теги, конвертированные из игры Imperator, с точки зрения их кочевого статуса? По умолчанию все «Мигрирующие племена», «Степные орды» (Invictus) и «Степные империи» (Terra-Indomita) конвертируются в кочевые государства.\n\nПРИМЕЧАНИЕ: Кочевники не могут мигрировать, если только они не вовлечены в ситуацию, которая это позволяет — например, в ситуацию «Великая Степь»!"
 IMPERATOR_NOMADS_ONLY_STEPPE: "Только в Степи"
 IMPERATOR_NOMADS_ONLY_STEPPE_TIP: "Все теги Imperator, преобразованные конвертером в кочевые и находящиеся за пределами степной зоны, преобразуются в племенные."
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Оставить снаружи, обратить степные племена"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "Теги из Imperator, которым конвертер присвоил статус «Кочевые», остаются без изменений, если они расположены за пределами Степи. Теги из Imperator, которым конвертер присвоил статус «Племенные», преобразуются в «Кочевые», если они находятся в Степи."
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Никого извне, обращение степных племён"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "Государства из Imperator, получившие в конвертере статус «Кочевые», преобразуются в «Племенные», если они расположены за пределами Степи. Государства из Imperator, получившие в конвертере статус «Племенные», преобразуются в «Кочевые», если они расположены в Степи."
 IMPERATOR_NOMADS_NO_NOMADS: "Нет кочевников"
 IMPERATOR_NOMADS_NO_NOMADS_TIP: "Все теги из Imperator, преобразованные конвертером в кочевые, становятся племенными."
 IMPERATOR_NOMADS_NO_CHANGES: "Без изменений"
 IMPERATOR_NOMADS_NO_CHANGES_TIP: "Теги Imperator никоим образом не модифицируются в части, касающейся статуса кочевников; используется именно то, что выдает конвертер."

 MANDALA_RULERS: "Линейки для мандал"
 MANDALA_RULERS_TIP: "(Требуется наличие дополнения «All Under Heaven» для активации эффекта) Должны ли правители, удовлетворяющие условиям «Мандалы» из базовой версии игры, получать форму правления «Мандала» в начале игры?\n\nПРИМЕЧАНИЕ: Условия «Мандалы», установленные базовой игрой, требуют, чтобы правитель исповедовал организованную политеистическую веру и обладал одним из следующих культурных наследий:\n- Австронезийское\n- Тайское\n- Мон-кхмерское\n- Вьетское\n- Индоарийское\n- Дравидийское\n- Бирманское\n- Цянское"
 MANDALA_RULERS_SEA_FEUDAL: "ЮВА — Феодалы"
 MANDALA_RULERS_SEA_FEUDAL_TIP: "Феодальные правители в Юго-Восточной Азии, удовлетворяющие условиям Мандалы." 
 MANDALA_RULERS_SEA_NONTRIBAL: "ЮВА — Неплеменные"
 MANDALA_RULERS_SEA_NONTRIBAL_TIP: "Все правители (кроме племенных, вануа и кочевых) в Юго-Восточной Азии, удовлетворяющие условиям Мандалы." 
 MANDALA_RULERS_SEA_ALL: "ЮВА — Все"
 MANDALA_RULERS_SEA_ALL_TIP: "Все правители в Юго-Восточной Азии, независимо от формы правления, удовлетворяющие условиям Мандалы." 
 MANDALA_RULERS_EVERYWHERE_FEUDAL: "Везде — Феодалы"
 MANDALA_RULERS_EVERYWHERE_FEUDAL_TIP: "Феодальные правители в любой точке мира, удовлетворяющие условиям Мандалы." 
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL: "Везде — Неплеменные"
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL_TIP: "Все правители (кроме племенных, вануа и кочевых) в любой точке мира, удовлетворяющие условиям Мандалы." 
 MANDALA_RULERS_EVERYWHERE_ALL: "Везде — Все"
 MANDALA_RULERS_EVERYWHERE_ALL_TIP: "Все правители в любой точке мира, независимо от формы правления, удовлетворяющие условиям Мандалы." 
 MANDALA_RULERS_NONE: "Никто"
 MANDALA_RULERS_NONE_TIP: "Ни один правитель не получит статус Мандалы в начале игры."

 RITSURYO_RULERS: "Рицурё правитель"
 RITSURYO_RULERS_TIP: "(Для срабатывания требуется наличие правила «Всё под небесами») Должен ли какой-либо правитель получить титулы «Империя Японии» и «Хризантемовый трон» в начале игры? В дополнение к условиям, определяемым данной опцией, персонаж также должен начать игру в статусе империи со столицей в Японии и иметь тип правления «Рицурё». Если какой-либо правитель уже начал игру, владея Империей Японии, данная опция не возымеет никакого эффекта. \n\nПРИМЕЧАНИЕ: Все империи с типом правления «Рицурё» — независимо от того, существуют ли они в начале игры или были сформированы уже в процессе, — получают собственный церемониальный титул сюзерена (подобный «Хризантемовому трону») и изначально используют закон о наследовании по праву первородства; этот порядок действует до тех пор, пока правитель не потерпит поражение от фракции свободы — в этот момент закон о наследовании сменяется на «Японское регентство»."
 RITSURYO_RULERS_JAPANESE_JAPAN: "Японское наследие"
 RITSURYO_RULERS_JAPANESE_JAPAN_TIP: "В начале игры титул Империи Японии может быть передан императору системы Рицурё, чья столица находится в Японии и который обладает японским культурным наследием."
 RITSURYO_RULERS_ANY_JAPAN: "Любое наследие"
 RITSURYO_RULERS_ANY_JAPAN_TIP: "В начале игры титул Империи Японии может быть передан императору системы Рицурё, чья столица находится в Японии, независимо от его культурного наследия."
 RITSURYO_RULERS_NONE: "Никто"
 RITSURYO_RULERS_NONE_TIP: "В начале игры титул Империи Японии не будет передан ни одному правителю."
