l_french:
 ENABLED: "Activé"
 DISABLED: "Désactivé"

 STATIC_DEJURE: "Voulez-vous des royaumes et empires de jure dynamiques ?"
 STATIC_DEJURE_TIP: "Dynamique est recommandé. En Dynamique, aucun royaume ou empire de jure ne sera conservé de CK3 vanilla, et de nouveaux seront créés le cas échéant basés sur les gouvernorats d'Imperator. En Statique, les royaumes et empires de jure seront basés sur un fichier de configuration."
 STATIC_DEJURE_DYNAMIC: "Dynamique"
 STATIC_DEJURE_DYNAMIC_TIP: "Déterminer le de jure CK3 par les gouvernorats d'Imperator."
 STATIC_DEJURE_STATIC: "Statique"
 STATIC_DEJURE_STATIC_TIP: "Prédéterminer le de jure CK3 principalement par CK3 vanilla mais avec des ajustements appropriés à l'époque."

 FILLER_DUKES: "Rang des détenteurs générés pour les zones non possédées"
 FILLER_DUKES_TIP: "Si une zone n'a pas de détenteur dans l'histoire, elle sera possédée par un détenteur de ce rang."
 FILLER_DUKES_COUNT: "Comte"
 FILLER_DUKES_COUNT_TIP: "Le convertisseur générera des comtes pour les zones non possédées."
 FILLER_DUKES_DUKE: "Duc"
 FILLER_DUKES_DUKE_TIP: "Le convertisseur générera des ducs pour les zones non possédées."

 USE_CK3_FLAGS: "Les drapeaux CK3 doivent-ils être utilisés si possible ?"
 USE_CK3_FLAGS_TIP: "Si les drapeaux CK3 doivent être utilisés pour les pays qui sont associés aux titres CK3 existants."
 USE_CK3_FLAGS_NO: "Non"
 USE_CK3_FLAGS_NO_TIP: "Le convertisseur utilisera les drapeaux d'Imperator pour tous les pays convertis."
 USE_CK3_FLAGS_YES: "Oui"
 USE_CK3_FLAGS_YES_TIP: "Le convertisseur utilisera les drapeaux CK3 pour les pays qui sont associés aux titres CK3 existants."

 HERESIES_IN_HISTORICAL_AREAS: "Voulez-vous convertir avec les hérésies historiques ?"
 HERESIES_IN_HISTORICAL_AREAS_TIP: "Cette option convertira certaines populations chrétiennes et manichéennes, si elles existent dans votre jeu, dans certaines zones de la carte d'Imperator: Rome vers une foi gnostique/dualiste ou une foi hérétique chrétienne dans les zones correspondantes de la carte de Crusader Kings III, selon où elles sont apparues historiquement. Par exemple, certaines provinces avec une majorité de population chrétienne ou manichéenne dans I:R pourraient être converties au Priscillianisme dans CK3."
 HERESIES_IN_HISTORICAL_AREAS_YES: "Oui"
 HERESIES_IN_HISTORICAL_AREAS_NO: "Non"

 IMPERATOR_CURRENCY_RATE: "Taux de change de la monnaie d'Imperator"
 IMPERATOR_CURRENCY_RATE_TIP: "Combien d'or CK3 devrait valoir 1 unité d'or d'Imperator ?"
 IMPERATOR_CURRENCY_RATE_INPUT_TIP: "Utilisez le point comme séparateur décimal."

 IMPERATOR_CIVILIZATION_WORTH: "Valeur de la civilisation d'Imperator"
 IMPERATOR_CIVILIZATION_WORTH_TIP: "Combien de développement CK3 devrait valoir 1 civilisation d'Imperator ?"
 IMPERATOR_CIVILIZATION_WORTH_INPUT_TIP: "Utilisez le point comme séparateur décimal."

 LEGION_CONVERSION: "[EXPÉRIMENTAL] Comment importer les légions dans CK3 ?"
 LEGION_CONVERSION_NO: "Ne pas le faire."
 LEGION_CONVERSION_SPECIAL: "Comme troupes spéciales."
 LEGION_CONVERSION_MAA: "[CASSE LE MULTIJOUEUR] Comme MAA."

 MODNAME: "Nom de sortie du mod (optionnel) :"
 MODNAMETIP: "Veuillez vous en tenir aux lettres latines."
 MODNAMETIP2: "Nom optionnel pour le mod converti (le nom par défaut est celui de la sauvegarde)."

 BOOKMARKDATE: "Date de repère CK3 (après J.-C., optionnel)"
 BOOKMARKDATETIP: "Date Anno Domini du repère CK3 généré, ne peut pas être antérieure à la date Anno Domini de la sauvegarde d'Imperator. Laissez vide pour utiliser par défaut la date actuelle de la sauvegarde d'Imperator."
 BOOKMARKDATETIP2: "Date Anno Domini du repère CK3 généré, ne peut pas être antérieure à la date Anno Domini de la sauvegarde d'Imperator. Laissez vide pour utiliser par défaut la date actuelle de la sauvegarde d'Imperator."

 SKIP_DYNAMIC_COA_EXTRACTION: "L'extraction des CoA générées par le jeu doit-elle être ignorée ?"
 SKIP_DYNAMIC_COA_EXTRACTION_TIP: "Si le convertisseur doit lancer Imperator pour extraire automatiquement tous les drapeaux générés par le jeu."
 SKIP_DYNAMIC_COA_EXTRACTION_NO: "Non"
 SKIP_DYNAMIC_COA_EXTRACTION_NO_TIP: "Le convertisseur lancera Imperator pour extraire tous les drapeaux générés par le jeu."
 SKIP_DYNAMIC_COA_EXTRACTION_YES: "Oui"
 SKIP_DYNAMIC_COA_EXTRACTION_YES_TIP: "Le convertisseur ne lancera pas Imperator pour extraire tous les drapeaux générés par le jeu."

 SKIP_HOLDING_OWNERS_IMPORT: "L'importation des propriétaires de domaines doit-elle être ignorée ?"
 SKIP_HOLDING_OWNERS_IMPORT_TIP: "Si le convertisseur doit importer les propriétaires de domaines d'Imperator comme barons et comtes."
 SKIP_HOLDING_OWNERS_IMPORT_NO: "Non"
 SKIP_HOLDING_OWNERS_IMPORT_NO_TIP: "Le convertisseur importera les propriétaires de domaines comme barons et comtes."
 SKIP_HOLDING_OWNERS_IMPORT_YES: "Oui"
 SKIP_HOLDING_OWNERS_IMPORT_YES_TIP: "Le convertisseur n'importera pas les propriétaires de domaines comme barons et comtes."

 FILLER_GOVERNMENTS: "Gouvernements des dirigeants de remplissage"
 FILLER_GOVERNMENTS_TIP: "(Pour l'instant, cette option ne détermine que quels dirigeants de remplissage doivent adopter le statut de Nomade ; elle nécessite donc l'extension *Khans of the Steppe* pour avoir un effet.) Quel gouvernement les dirigeants de remplissage créés par le convertisseur doivent-ils adopter ? Par défaut, les dirigeants de remplissage seront généralement de type Tribal au début de la partie."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL: "Nomades des steppes – Tous"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL_TIP: "Tous les dirigeants de remplissage situés dans la steppe adoptent le statut de Nomade."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE: "Nomades des steppes – Héritage"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE_TIP: "Les dirigeants de remplissage situés dans la steppe adoptent le statut de Nomade s'ils possèdent l'un des héritages culturels suivants :\n- Iranien\n- Mongol\n- Turc\n- Magyar\n- Ougro-permien."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD: "Nomades des steppes – Chef de culture du troupeau"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD_TIP: "Les dirigeants génériques des steppes acquièrent le statut de nomades si leur chef de culture est déterminé par la taille du troupeau."
 FILLER_GOVERNMENTS_ALL_NOMADS: "Tous les nomades"
 FILLER_GOVERNMENTS_ALL_NOMADS_TIP: "Tous les dirigeants de remplissage deviennent nomades.\n\nNOTE: Les nomades ne peuvent pas migrer à moins d'être impliqués dans une situation le permettant, telle que la situation de la Grande Steppe!"
 FILLER_GOVERNMENTS_NO_CHANGES: "Aucun changement"
 FILLER_GOVERNMENTS_NO_CHANGES_TIP: "Les dirigeants de remplissage ne sont modifiés d'aucune manière ; ils conservent les caractéristiques générées par le convertisseur."

 IMPERATOR_NOMADS: "Nomades Impérator"
 IMPERATOR_NOMADS_TIP: "(Nécessite l'activation de « Khans of the Steppe » pour prendre effet) Comment les tags convertis depuis Imperator doivent-ils être gérés du point de vue du statut nomade ? Par défaut, toutes les Tribus migratrices, les Hordes des steppes (Invictus) et les Empires des steppes (Terra Indomita) sont convertis en entités nomades.\n\nNOTE : Les nomades ne peuvent pas migrer, à moins d'être impliqués dans une situation le permettant, telle que la situation de la Grande Steppe !"
 IMPERATOR_NOMADS_ONLY_STEPPE: "Uniquement dans la steppe"
 IMPERATOR_NOMADS_ONLY_STEPPE_TIP: "Toutes les tags d'Imperator rendues nomades par le convertisseur et situées hors de la steppe sont converties en nations tribales."
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Laisser à l'extérieur, convertir les tribus des steppes"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "Les tags d'Imperator rendus nomades par le convertisseur restent inchangés s'ils se situent en dehors de la Steppe. Les tags d'Imperator rendus tribaux par le convertisseur sont convertis en nomades s'ils se situent dans la Steppe."
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Aucun à l'extérieur, convertir les tribus des steppes."
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "Les tags d'Imperator rendues nomades par le convertisseur sont converties en nations tribales si elles se situent hors de la Steppe. Les nations d'Imperator rendues tribales par le convertisseur sont converties en nations nomades si elles se situent dans la Steppe."
 IMPERATOR_NOMADS_NO_NOMADS: "Pas de nomades"
 IMPERATOR_NOMADS_NO_NOMADS_TIP: "Toutes les balises Imperator rendues nomades par le convertisseur deviennent tribales."
 IMPERATOR_NOMADS_NO_CHANGES: "Aucun changement"
 IMPERATOR_NOMADS_NO_CHANGES_TIP: "Les tags Imperator ne sont en aucun cas modifiés quant à leur statut nomade, le convertisseur utilisant les données telles qu'elles sont générées."

 MANDALA_RULERS: "Souverains du Mandala"
 MANDALA_RULERS_TIP: "(Nécessite l'extension *All Under Heaven* pour être effectif) Quels souverains, remplissant les conditions du Mandala du jeu de base, doivent-ils se voir attribuer le régime politique du Mandala au début de la partie ?\n\nNOTE: Les conditions du Mandala, établies par le jeu de base, exigent que le souverain possède une foi polythéiste organisée, ainsi que l'un des héritages culturels suivants:\n- Austronésien\n- Tai\n- Mon-Khmer\n- Viet\n- Indo-aryen\n- Dravidien\n- Birman\n- Qiangique"
 MANDALA_RULERS_SEA_FEUDAL: "SEA – Féodaux"
 MANDALA_RULERS_SEA_FEUDAL_TIP: "Les souverains féodaux qui remplissent les conditions du Mandala en Asie du Sud-Est."
 MANDALA_RULERS_SEA_NONTRIBAL: "SEA – Non-tribaux"
 MANDALA_RULERS_SEA_NONTRIBAL_TIP: "Tous les souverains non tribaux, non Wanua et non nomades qui remplissent les conditions du Mandala en Asie du Sud-Est."
 MANDALA_RULERS_SEA_ALL: "SEA – Tous"
 MANDALA_RULERS_SEA_ALL_TIP: "Tous les souverains, quel que soit leur régime politique, qui remplissent les conditions du Mandala en Asie du Sud-Est."
 MANDALA_RULERS_EVERYWHERE_FEUDAL: "Partout – Féodaux"
 MANDALA_RULERS_EVERYWHERE_FEUDAL_TIP: "Les souverains féodaux qui remplissent les conditions du Mandala, où qu'ils se trouvent."
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL: "Partout – Non-tribaux"
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL_TIP: "Tous les souverains non tribaux, non Wanua et non nomades qui remplissent les conditions du Mandala, où qu'ils se trouvent."
 MANDALA_RULERS_EVERYWHERE_ALL: "Partout – Tous"
 MANDALA_RULERS_EVERYWHERE_ALL_TIP: "Tous les souverains, quel que soit leur type de gouvernement, qui remplissent les conditions du Mandala, où qu'ils se trouvent."
 MANDALA_RULERS_NONE: "Aucun"
 MANDALA_RULERS_NONE_TIP: "Aucun souverain ne sera désigné comme Mandala au début de la partie."

 RITSURYO_RULERS: "Souverains du Ritsuryo"
 RITSURYO_RULERS_TIP: "(Nécessite que l'option « Tout sous le Ciel » soit active pour produire un effet) Un souverain doit-il se voir attribuer les titres d'« Empire du Japon » et de « Trône du Chrysanthème » au début de la partie ? Outre les conditions déterminées par cette option, le personnage doit également débuter la partie en tant qu'Empire, avec sa capitale située au Japon, et adopter le type de gouvernement *Ritsuryō*. Si un souverain possède déjà l'Empire du Japon au début de la partie, cette option restera sans effet. \n\nNOTE : Tous les Empires *Ritsuryō* — qu'ils existent dès le début de la partie ou qu'ils soient formés en cours de jeu — se voient attribuer leur propre titre de suzerain cérémoniel (tel que le Trône du Chrysanthème) ; ils débutent sous le régime de la primogéniture, qu'ils conservent jusqu'à ce qu'ils s'inclinent face à une faction de la liberté, moment auquel ils basculent vers la loi de succession de la Régence japonaise."
 RITSURYO_RULERS_JAPANESE_JAPAN: "Héritage japonique"
 RITSURYO_RULERS_JAPANESE_JAPAN_TIP: "Au début de la partie, l'Empire du Japon peut être attribué à un empereur Ritsuryō dont la capitale se situe au Japon et qui possède l'héritage japonique."
 RITSURYO_RULERS_ANY_JAPAN: "Tout héritage"
 RITSURYO_RULERS_ANY_JAPAN_TIP: "Au début de la partie, l'Empire du Japon peut être attribué à un empereur Ritsuryō dont la capitale se situe au Japon, quel que soit son héritage culturel."
 RITSURYO_RULERS_NONE: "Aucun"
 RITSURYO_RULERS_NONE_TIP: "Aucun souverain ne se verra attribuer l'Empire du Japon au début de la partie."
