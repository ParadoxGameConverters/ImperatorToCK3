l_english:
 ENABLED: "Enabled"
 DISABLED: "Disabled"

 STATIC_DEJURE: "Do you want to dynamic de jure kingdoms and empires?"
 STATIC_DEJURE_TIP: "Dynamic is recommended. In Dynamic, no de jure kingdoms or empires will be retained from vanilla CK3, and new ones will be created where applicable based on Imperator governorships. In Static, de jure kingdoms and empires will be based on a configuration file."
 STATIC_DEJURE_DYNAMIC: "Dynamic"
 STATIC_DEJURE_DYNAMIC_TIP: "Determine CK3 de jure by Imperator governorships."
 STATIC_DEJURE_STATIC: "Static"
 STATIC_DEJURE_STATIC_TIP: "Predetermine CK3 de jure mostly by vanilla CK3 but with time appropriate tweaks."

 FILLER_DUKES: "Rank of holders generated for unowned areas"
 FILLER_DUKES_TIP: "If an area does not have a holder in history, it will be owned by a holder of this rank."
 FILLER_DUKES_COUNT: "Count"
 FILLER_DUKES_COUNT_TIP: "The converter will generate counts for unowned areas."
 FILLER_DUKES_DUKE: "Duke"
 FILLER_DUKES_DUKE_TIP: "The converter will generate dukes for unowned areas."

 USE_CK3_FLAGS: "Should CK3 flags be used if possible?"
 USE_CK3_FLAGS_TIP: "Whether CK3 flags should be used for countries that are mapped to existing CK3 titles."
 USE_CK3_FLAGS_NO: "No"
 USE_CK3_FLAGS_NO_TIP: "The converter will use Imperator flags for all converted countries."
 USE_CK3_FLAGS_YES: "Yes"
 USE_CK3_FLAGS_YES_TIP: "The converted will use CK3 flags for countries that are mapped to existing CK3 titles."

 HERESIES_IN_HISTORICAL_AREAS: "Do you want to convert with historical heresies?"
 HERESIES_IN_HISTORICAL_AREAS_TIP: "This option will convert some Christian and Manichean pops, if they exist in your game, in certain areas of the Imperator: Rome map to a Gnostic/Dualist faith or Christian heretical faith in the corresponding areas of the Crusader Kings III map, depending on where they appeared historically. For example, some provinces with a majority Christian or Manichean population in I:R could be converted to Priscillianism in CK3."
 HERESIES_IN_HISTORICAL_AREAS_YES: "Yes"
 HERESIES_IN_HISTORICAL_AREAS_NO: "No"

 IMPERATOR_CURRENCY_RATE: "Imperator currency rate"
 IMPERATOR_CURRENCY_RATE_TIP: "How much CK3 gold should 1 Imperator gold unit be worth?"
 IMPERATOR_CURRENCY_RATE_INPUT_TIP: "Use dot as decimal separator."

 IMPERATOR_CIVILIZATION_WORTH: "Imperator civilization worth"
 IMPERATOR_CIVILIZATION_WORTH_TIP: "How much CK3 development should 1 Imperator civilization be worth?"
 IMPERATOR_CIVILIZATION_WORTH_INPUT_TIP: "Use dot as decimal separator."

 LEGION_CONVERSION: "[EXPERIMENTAL] How to import legions to CK3?"
 LEGION_CONVERSION_NO: "Don't."
 LEGION_CONVERSION_SPECIAL: "As special troops."
 LEGION_CONVERSION_MAA: "[BREAKS MULTIPLAYER] As MAA."

 #CONVERTCHARACTERBIRTHANDDEATHDATES: "Base for character birth date conversion"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_TIP: "Characters' birth dates can be based on either their birth dates in Imperator or their Imperator age."
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1: "Birth date"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1_TIP: "Recommended when you're converting without a big time gap."
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2: "Age"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2_TIP: "Recommended when you're converting much earlier than the CK3 bookmark date."

 MODNAME: "Mod Output Name (optional):"
 MODNAMETIP: "Please, stick to Latin letters."
 MODNAMETIP2: "Optional name for the converted mod (default name is the one of the savegame)."

 BOOKMARKDATE: "CK3 bookmark date (AD, optional)"
 BOOKMARKDATETIP: "Anno Domini date of the generated CK3 bookmark, can not be earlier than the Anno Domini Imperator save date. Leave empty to default to Imperator save's current date."
 BOOKMARKDATETIP2: "Anno Domini date of the generated CK3 bookmark, can not be earlier than the Anno Domini Imperator save date. Leave empty to default to Imperator save's current date."

 SKIP_DYNAMIC_COA_EXTRACTION: "Should game-generated CoA extraction be skipped?"
 SKIP_DYNAMIC_COA_EXTRACTION_TIP: "Whether the converter should launch Imperator to automatically extract all game-generated flags."
 SKIP_DYNAMIC_COA_EXTRACTION_NO: "No"
 SKIP_DYNAMIC_COA_EXTRACTION_NO_TIP: "The converter will launch Imperator to extract all game-generated flags."
 SKIP_DYNAMIC_COA_EXTRACTION_YES: "Yes"
 SKIP_DYNAMIC_COA_EXTRACTION_YES_TIP: "The converted will not launch Imperator to extract all game-generated flags."

 SKIP_HOLDING_OWNERS_IMPORT: "Should importing holding owners be skipped?"
 SKIP_HOLDING_OWNERS_IMPORT_TIP: "Whether the converter should import Imperator holding owners as barons and counts."
 SKIP_HOLDING_OWNERS_IMPORT_NO: "No"
 SKIP_HOLDING_OWNERS_IMPORT_NO_TIP: "The converter will import holding owners as barons and counts."
 SKIP_HOLDING_OWNERS_IMPORT_YES: "Yes"
 SKIP_HOLDING_OWNERS_IMPORT_YES_TIP: "The converter will not import holding owners as barons and counts."

 IMPERATOR_NOMADS: "Imperator Nomads"
 IMPERATOR_NOMADS_TIP: "(Requires Khans of the Steppe to have an effect) How should tags converted from Imperator be handled in terms of being Nomadic? By default, all Migratory Tribes, Steppe Hordes (Invictus), and Steppe Empires (Terra-Indomita) convert to Nomadic.\n\nNOTE: Nomads can't migrate unless they are involved in a situation that allows it, like the Great Steppe situation!"
 IMPERATOR_NOMADS_ONLY_STEPPE: "Only in Steppe"
 IMPERATOR_NOMADS_ONLY_STEPPE_TIP: "All Imperator tags made Nomadic by the converter that are outside the Steppe convert to Tribal."
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Leave Outside, Convert Steppe Tribes"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "Imperator tags made Nomadic by the converter are left alone if they are outside the Steppe. Imperator tags made Tribal by the converter are converted to Nomadic if they are in the Steppe."
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES: "None Outside, Convert Steppe Tribes"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "Imperator tags made Nomadic by the converter are converted to Tribal if they are outside the Steppe. Imperator tags made Tribal by the converter are converted to Nomadic if they are in the Steppe."
 IMPERATOR_NOMADS_NO_NOMADS: "No Nomads"
 IMPERATOR_NOMADS_NO_NOMADS_TIP: "All Imperator tags made Nomadic by the converter are made Tribal."
 IMPERATOR_NOMADS_NO_CHANGES: "No Changes"
 IMPERATOR_NOMADS_NO_CHANGES_TIP: "Imperator tags are not modified in any way in terms of being Nomadic, using whatever the converter outputs."



