l_italian:
 ENABLED: "Abilitato"
 DISABLED: "Disabilitato"

 STATIC_DEJURE: "Vuoi regni e imperi de jure dinamici?"
 STATIC_DEJURE_TIP: "Dinamico è raccomandato. In Dinamico, nessun regno o impero de jure sarà mantenuto da CK3 vanilla, e ne saranno creati di nuovi dove applicabile basati sui governatorati di Imperator. In Statico, i regni e gli imperi de jure saranno basati su un file di configurazione."
 STATIC_DEJURE_DYNAMIC: "Dinamico"
 STATIC_DEJURE_DYNAMIC_TIP: "Determina il de jure di CK3 tramite i governatorati di Imperator."
 STATIC_DEJURE_STATIC: "Statico"
 STATIC_DEJURE_STATIC_TIP: "Predetermina il de jure di CK3 principalmente tramite CK3 vanilla ma con modifiche appropriate al periodo."

 FILLER_DUKES: "Rango dei possessori generati per aree non possedute"
 FILLER_DUKES_TIP: "Se un'area non ha un possessore nella storia, sarà posseduta da un possessore di questo rango."
 FILLER_DUKES_COUNT: "Conte"
 FILLER_DUKES_COUNT_TIP: "Il convertitore genererà conti per le aree non possedute."
 FILLER_DUKES_DUKE: "Duca"
 FILLER_DUKES_DUKE_TIP: "Il convertitore genererà duchi per le aree non possedute."

 USE_CK3_FLAGS: "Le bandiere di CK3 dovrebbero essere usate se possibile?"
 USE_CK3_FLAGS_TIP: "Se le bandiere di CK3 dovrebbero essere usate per i paesi che sono mappati ai titoli CK3 esistenti."
 USE_CK3_FLAGS_NO: "No"
 USE_CK3_FLAGS_NO_TIP: "Il convertitore userà le bandiere di Imperator per tutti i paesi convertiti."
 USE_CK3_FLAGS_YES: "Sì"
 USE_CK3_FLAGS_YES_TIP: "Il convertitore userà le bandiere di CK3 per i paesi che sono mappati ai titoli CK3 esistenti."

 HERESIES_IN_HISTORICAL_AREAS: "Vuoi convertire con le eresie storiche?"
 HERESIES_IN_HISTORICAL_AREAS_TIP: "Questa opzione convertirà alcune popolazioni cristiane e manichee, se esistono nel tuo gioco, in certe aree della mappa di Imperator: Rome verso una fede gnostica/dualista o una fede eretica cristiana nelle aree corrispondenti della mappa di Crusader Kings III, a seconda di dove sono apparse storicamente. Per esempio, alcune province con una maggioranza di popolazione cristiana o manichea in I:R potrebbero essere convertite al Priscillianesimo in CK3."
 HERESIES_IN_HISTORICAL_AREAS_YES: "Sì"
 HERESIES_IN_HISTORICAL_AREAS_NO: "No"

 IMPERATOR_CURRENCY_RATE: "Tasso di cambio della valuta di Imperator"
 IMPERATOR_CURRENCY_RATE_TIP: "Quanto oro di CK3 dovrebbe valere 1 unità d'oro di Imperator?"
 IMPERATOR_CURRENCY_RATE_INPUT_TIP: "Usa il punto come separatore decimale."

 IMPERATOR_CIVILIZATION_WORTH: "Valore della civiltà di Imperator"
 IMPERATOR_CIVILIZATION_WORTH_TIP: "Quanto sviluppo di CK3 dovrebbe valere 1 civiltà di Imperator?"
 IMPERATOR_CIVILIZATION_WORTH_INPUT_TIP: "Usa il punto come separatore decimale."

 LEGION_CONVERSION: "[SPERIMENTALE] Come importare le legioni in CK3?"
 LEGION_CONVERSION_NO: "Non farlo."
 LEGION_CONVERSION_SPECIAL: "Come truppe speciali."
 LEGION_CONVERSION_MAA: "[ROMPE IL MULTIGIOCATORE] Come MAA."

 MODNAME: "Nome Output Mod (opzionale):"
 MODNAMETIP: "Per favore, attieniti alle lettere latine."
 MODNAMETIP2: "Nome opzionale per il mod convertito (il nome predefinito è quello del salvataggio)."

 BOOKMARKDATE: "Data del segnalibro di CK3 (d.C., opzionale)"
 BOOKMARKDATETIP: "Data Anno Domini del segnalibro di CK3 generato, non può essere anteriore alla data Anno Domini del salvataggio di Imperator. Lascia vuoto per usare come predefinito la data attuale del salvataggio di Imperator."
 BOOKMARKDATETIP2: "Data Anno Domini del segnalibro di CK3 generato, non può essere anteriore alla data Anno Domini del salvataggio di Imperator. Lascia vuoto per usare come predefinito la data attuale del salvataggio di Imperator."

 SKIP_DYNAMIC_COA_EXTRACTION: "L'estrazione dei CoA generati dal gioco dovrebbe essere saltata?"
 SKIP_DYNAMIC_COA_EXTRACTION_TIP: "Se il convertitore dovrebbe avviare Imperator per estrarre automaticamente tutte le bandiere generate dal gioco."
 SKIP_DYNAMIC_COA_EXTRACTION_NO: "No"
 SKIP_DYNAMIC_COA_EXTRACTION_NO_TIP: "Il convertitore avvierà Imperator per estrarre tutte le bandiere generate dal gioco."
 SKIP_DYNAMIC_COA_EXTRACTION_YES: "Sì"
 SKIP_DYNAMIC_COA_EXTRACTION_YES_TIP: "Il convertitore non avvierà Imperator per estrarre tutte le bandiere generate dal gioco."

 SKIP_HOLDING_OWNERS_IMPORT: "L'importazione dei proprietari di possedimenti dovrebbe essere saltata?"
 SKIP_HOLDING_OWNERS_IMPORT_TIP: "Se il convertitore dovrebbe importare i proprietari di possedimenti di Imperator come baroni e conti."
 SKIP_HOLDING_OWNERS_IMPORT_NO: "No"
 SKIP_HOLDING_OWNERS_IMPORT_NO_TIP: "Il convertitore importerà i proprietari di possedimenti come baroni e conti."
 SKIP_HOLDING_OWNERS_IMPORT_YES: "Sì"
 SKIP_HOLDING_OWNERS_IMPORT_YES_TIP: "Il convertitore non importerà i proprietari di possedimenti come baroni e conti."

 FILLER_GOVERNMENTS: "Governi dei personaggi riempitivo"
 FILLER_GOVERNMENTS_TIP: "(Al momento, questa opzione influenza esclusivamente quali sovrani riempitivo debbano essere resi Nomadi; pertanto, richiede il DLC 'Khans of the Steppe' per avere effetto.) Quale forma di governo dovrebbero adottare i sovrani riempitivo creati dal convertitore? Di norma, i sovrani riempitivo saranno di default di tipo Tribale all'inizio del gioco." 
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL: "Nomadi delle Steppe - Tutti"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL_TIP: "Tutti i sovrani riempitivo nelle Steppe vengono resi Nomadi." 
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE: "Nomadi delle Steppe - Retaggio"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE_TIP: "I sovrani riempitivo nelle Steppe vengono resi Nomadi se possiedono uno dei seguenti retaggi culturali:\n- Iranico\n- Mongolo\n- Turco\n- Magiaro\n- Ugro-permiano."
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD: "Nomadi delle Steppe – Capi della Cultura Pastorale"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD_TIP: "I regnanti di riempimento nelle Steppe vengono resi Nomadi se il capo della loro cultura è determinato dalle dimensioni della mandria."
 FILLER_GOVERNMENTS_ALL_NOMADS: "Tutti Nomadi"
 FILLER_GOVERNMENTS_ALL_NOMADS_TIP: "Tutti i regnanti di riempimento vengono resi Nomadi.\n\nNOTA: I Nomadi non possono migrare a meno che non siano coinvolti in una situazione che lo consenta, come la situazione della Grande Steppa!"
 FILLER_GOVERNMENTS_NO_CHANGES: "Nessuna modifica"
 FILLER_GOVERNMENTS_NO_CHANGES_TIP: "I regnanti di riempimento non vengono modificati in alcun modo, utilizzando quanto generato dal convertitore."

 IMPERATOR_NOMADS: "Imperator Nomadi"
 IMPERATOR_NOMADS_TIP: "(Richiede Khans of the Steppe per avere effetto) Come devono essere gestiti i tag convertiti da Imperator per quanto riguarda lo status di Nomadi? Per impostazione predefinita, tutte le Tribù Migratorie, le Orde della Steppa (Invictus) e gli Imperi della Steppa (Terra-Indomita) vengono convertiti in Nomadi.\n\nNOTA: I Nomadi non possono migrare a meno che non siano coinvolti in una situazione che lo consenta, come la situazione della Grande Steppa!" 
 IMPERATOR_NOMADS_ONLY_STEPPE: "Solo nella Steppa"
 IMPERATOR_NOMADS_ONLY_STEPPE_TIP: "Tutti i tag di Imperator resi Nomadi dal convertitore che si trovano al di fuori della Steppa vengono convertiti in Tribali." 
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Lascia fuori, converti le tribù della Steppa"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "I tag di Imperator resi Nomadi dal convertitore vengono lasciati inalterati se si trovano al di fuori della Steppa. I tag di Imperator resi Tribali dal convertitore vengono convertiti in Nomadi se si trovano nella Steppa." 
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES: "Nessuno fuori, converti le tribù della Steppa"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "I tag di Imperator resi Nomadi dal convertitore vengono convertiti in Tribali se si trovano al di fuori della Steppa. I tag di Imperator resi Tribali dal convertitore vengono convertiti in Nomadi se si trovano nella Steppa." 
 IMPERATOR_NOMADS_NO_NOMADS: "Nessun Nomade"
 IMPERATOR_NOMADS_NO_NOMADS_TIP: "Tutti i tag di Imperator resi Nomadi dal convertitore vengono resi Tribali."
 IMPERATOR_NOMADS_NO_CHANGES: "Nessuna modifica"
 IMPERATOR_NOMADS_NO_CHANGES_TIP: "I tag di Imperator non vengono modificati in alcun modo per quanto riguarda lo status nomade, utilizzando quanto prodotto dal convertitore."

 MANDALA_RULERS: "Righelli per Mandala"
 MANDALA_RULERS_TIP: "(Richiede che All Under Heaven sia attivo per avere effetto) A quali sovrani, che soddisfano le Condizioni del Mandala del gioco base, dovrebbe essere assegnato il governo Mandala all'inizio della partita?\n\nNOTA: Le Condizioni del Mandala stabilite dal gioco base richiedono che il sovrano professi una fede politeista e possieda una delle seguenti eredità culturali:\n- Austronesiana\n- Tai\n- Mon-Khmer\n- Viet\n- Indo-ariana\n- Dravidica\n- Birmana\n- Qiangica"
 MANDALA_RULERS_SEA_FEUDAL: "SEA - Feudali"
 MANDALA_RULERS_SEA_FEUDAL_TIP: "Sovrani feudali che soddisfano le Condizioni del Mandala nel Sud-est asiatico." 
 MANDALA_RULERS_SEA_NONTRIBAL: "SEA - Non tribali"
 MANDALA_RULERS_SEA_NONTRIBAL_TIP: "Tutti i sovrani non tribali/Wanua/nomadi che soddisfano le Condizioni del Mandala nel Sud-est asiatico." 
 MANDALA_RULERS_SEA_ALL: "SEA - Tutti"
 MANDALA_RULERS_SEA_ALL_TIP: "Tutti i sovrani, indipendentemente dalla forma di governo, che soddisfano le Condizioni Mandala nel Sud-est asiatico." 
 MANDALA_RULERS_EVERYWHERE_FEUDAL: "Ovunque - Feudali"
 MANDALA_RULERS_EVERYWHERE_FEUDAL_TIP: "Sovrani feudali che soddisfano le Condizioni Mandala in qualsiasi luogo." 
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL: "Ovunque - Non tribali"
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL_TIP: "Tutti i sovrani non tribali/Wanua/nomadi che soddisfano le Condizioni Mandala in qualsiasi luogo." 
 MANDALA_RULERS_EVERYWHERE_ALL: "Ovunque - Tutti"
 MANDALA_RULERS_EVERYWHERE_ALL_TIP: "Tutti i sovrani, indipendentemente dalla forma di governo, che soddisfano le Condizioni Mandala in qualsiasi luogo." 
 MANDALA_RULERS_NONE: "Nessuno"
 MANDALA_RULERS_NONE_TIP: "Nessun sovrano diventerà Mandala all'inizio della partita."

 RITSURYO_RULERS: "Righelli per Ritsuryo"
 RITSURYO_RULERS_TIP: "(Richiede che l'opzione All Under Heaven sia attiva affinché abbia effetto) Un sovrano dovrebbe ricevere i titoli di Impero del Giappone e Trono del Crisantemo all'inizio della partita? Oltre alle condizioni stabilite da questa opzione, il personaggio deve iniziare la partita come Impero con la capitale in Giappone e possedere il tipo di governo Ritsuryo. Se un sovrano ha già iniziato la partita in possesso dell'Impero del Giappone, questa opzione non avrà alcun effetto. \n\nNOTA: Tutti gli Imperi Ritsuryo — che esistano all'inizio della partita o vengano costituiti nel corso del gioco — ottengono un proprio titolo cerimoniale di signoria (come il Trono del Crisantemo) e adottano inizialmente la legge di successione per Primogenitura; tale legge rimane in vigore finché l'Impero non viene sconfitto da una Fazione per la Libertà, momento in cui passa alla legge di successione della Reggenza Giapponese."
 RITSURYO_RULERS_JAPANESE_JAPAN: "Eredità nipponica"
 RITSURYO_RULERS_JAPANESE_JAPAN_TIP: "All'inizio della partita, l'Impero del Giappone può essere assegnato a un Imperatore Ritsuryo la cui capitale si trovi in ​​Giappone e che possieda l'Eredità nipponica." 
 RITSURYO_RULERS_ANY_JAPAN: "Qualsiasi eredità"
 RITSURYO_RULERS_ANY_JAPAN_TIP: "All'inizio della partita, l'Impero del Giappone può essere assegnato a un Imperatore Ritsuryo la cui capitale si trovi in ​​Giappone, indipendentemente dalla sua eredità culturale." 
 RITSURYO_RULERS_NONE: "Nessuno"
 RITSURYO_RULERS_NONE_TIP: "A nessun sovrano verrà assegnato l'Impero del Giappone all'inizio della partita."
