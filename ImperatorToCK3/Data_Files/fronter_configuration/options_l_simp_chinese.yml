l_simp_chinese:
 IMPERATORDEJURE: "是否以CK3法理为根据应用至IR设置。"
 IMPERATORDEJURETIP: "推荐使用CK3法理。"
 IMPERATORDEJURE1: "区域至王国"
 IMPERATORDEJURE1TIP: "使IR的区域转换为CK3的法理王国。"
 IMPERATORDEJURE2: "国家"
 IMPERATORDEJURE2TIP: "以CK3法理适用于IR国家。"
 IMPERATORDEJURE3: "否"
 IMPERATORDEJURE3TIP: "保持原版CK3法理。"

 #CONVERTCHARACTERBIRTHANDDEATHDATES: "角色生日转换基础"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_TIP: "角色生日可以基于其在IR的出生日期或者其IR年龄。"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1: "基于出生日期"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1_TIP: "建议在你并无巨大时间差转换时使用。"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2: "年龄"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2_TIP: "推荐当你从远早于AD867年的存档转换时使用。" #outdated, CK3 bookmark date isn't always 867 now

 MODNAME: "MOD导出名称（可选）："
 MODNAMETIP: "请使用Latin字母"
 MODNAMETIP2: "可选的MOD导出名称（默认名称使用存档名之一）"

 SKIP_HOLDING_OWNERS_IMPORT: "是否跳过导入领地所有者？"
 SKIP_HOLDING_OWNERS_IMPORT_TIP: "是否将 Imperator 的领地所有者导入为男爵和伯爵。"
 SKIP_HOLDING_OWNERS_IMPORT_NO: "否"
 SKIP_HOLDING_OWNERS_IMPORT_NO_TIP: "转换器会将领地所有者导入为男爵和伯爵。"
 SKIP_HOLDING_OWNERS_IMPORT_YES: "是"
 SKIP_HOLDING_OWNERS_IMPORT_YES_TIP: "转换器不会将领地所有者导入为男爵和伯爵。"

 IMPERATOR_NOMADS: "帝王游牧民"
 IMPERATOR_NOMADS_TIP: "（需启用“草原可汗”模组方可生效）对于从《英白拉多》转换而来的国家标签，应如何处理其“游牧”属性？默认情况下，所有“迁徙部落”、“草原部落”（Invictus）以及“草原帝国”（Terra-Indomita）均会被转换为“游牧”政体。\n\n注：游牧政体无法进行迁徙，除非其正处于允许迁徙的特定情境下——例如“大草原”情境！"
 IMPERATOR_NOMADS_ONLY_STEPPE: "唯在草原"
 IMPERATOR_NOMADS_ONLY_STEPPE_TIP: "所有经转换器处理后变为“游牧”政体、且位于草原地区以外的《Imperator》标签，均将转换为“部落”政体。"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES: "置之度外，转化草原部落"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "经转换器处理后被设定为“游牧”政体的《Imperator》标签，若其位于草原地区之外，则保持原状不变；若其位于草原地区之内，则会被转换为“游牧”政体。"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES: "不向外扩张，转化草原部落"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "若经转换器处理后被设定为“游牧”政体的《Imperator》标签位于草原地区之外，则会被转换为“部落”政体；若经转换器处理后被设定为“部落”政体的《Imperator》标签位于草原地区之内，则会被转换为“游牧”政体。"
 IMPERATOR_NOMADS_NO_NOMADS: "无游牧者"
 IMPERATOR_NOMADS_NO_NOMADS_TIP: "所有经转换器处理后变为“游牧”政体的《Imperator》标签，均被设定为“部落”政体。"
 IMPERATOR_NOMADS_NO_CHANGES: "无更改"
 IMPERATOR_NOMADS_NO_CHANGES_TIP: "在“游牧”属性方面，《Imperator》标签未作任何修改，完全沿用转换器输出的结果。"
