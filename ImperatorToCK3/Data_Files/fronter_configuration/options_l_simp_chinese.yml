l_simp_chinese:
 IMPERATORDEJURE: "是否以CK3法理为根据应用至IR设置。"
 IMPERATORDEJURETIP: "推荐使用CK3法理。"
 IMPERATORDEJURE1: "区域至王国"
 IMPERATORDEJURE1TIP: "使IR的区域转换为CK3的法理王国。"
 IMPERATORDEJURE2: "国家"
 IMPERATORDEJURE2TIP: "以CK3法理适用于IR国家。"
 IMPERATORDEJURE3: "否"
 IMPERATORDEJURE3TIP: "保持原版CK3法理。"

 #CONVERTCHARACTERBIRTHANDDEATHDATES: "角色生日转换基础"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_TIP: "角色生日可以基于其在IR的出生日期或者其IR年龄。"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1: "基于出生日期"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_1_TIP: "建议在你并无巨大时间差转换时使用。"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2: "年龄"
 #CONVERTCHARACTERBIRTHANDDEATHDATES_2_TIP: "推荐当你从远早于AD867年的存档转换时使用。" #outdated, CK3 bookmark date isn't always 867 now

 MODNAME: "MOD导出名称（可选）："
 MODNAMETIP: "请使用Latin字母"
 MODNAMETIP2: "可选的MOD导出名称（默认名称使用存档名之一）"

 SKIP_HOLDING_OWNERS_IMPORT: "是否跳过导入领地所有者？"
 SKIP_HOLDING_OWNERS_IMPORT_TIP: "是否将 Imperator 的领地所有者导入为男爵和伯爵。"
 SKIP_HOLDING_OWNERS_IMPORT_NO: "否"
 SKIP_HOLDING_OWNERS_IMPORT_NO_TIP: "转换器会将领地所有者导入为男爵和伯爵。"
 SKIP_HOLDING_OWNERS_IMPORT_YES: "是"
 SKIP_HOLDING_OWNERS_IMPORT_YES_TIP: "转换器不会将领地所有者导入为男爵和伯爵。"

 FILLER_GOVERNMENTS: "填充政体"
 FILLER_GOVERNMENTS_TIP: "（目前，此选项仅影响哪些填充统治者应被设定为游牧政体，因此需启用《草原可汗》DLC方能生效。）由转换器生成的填充统治者应采用何种政体？通常情况下，填充统治者在开局时默认采用部落政体。"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL: "草原游牧民 — 全部"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_ALL_TIP: "草原地区的所有填充统治者均被设定为游牧政体。"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE: "草原游牧民 — 文化传承"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERITAGE_TIP: "若草原地区的填充统治者拥有以下任一文化传承，则会被设定为游牧政体：\n- 伊朗系\n- 蒙古系\n- 突厥系\n- 马扎尔系\n- 乌戈尔-彼尔姆系"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD: "草原游牧民 —— 畜群文化领袖"
 FILLER_GOVERNMENTS_STEPPE_NOMADS_HERDHEAD_TIP: "若草原地区的文化领袖由畜群规模决定，则该地区的填充统治者将被设定为游牧民。"
 FILLER_GOVERNMENTS_ALL_NOMADS: "所有游牧民"
 FILLER_GOVERNMENTS_ALL_NOMADS_TIP: "所有填充统治者均被设定为游牧民。\n\n注：除非处于允许迁徙的特定情境中（例如“大草原”情境），否则游牧民无法进行迁徙！"
 FILLER_GOVERNMENTS_NO_CHANGES: "无更改"
 FILLER_GOVERNMENTS_NO_CHANGES_TIP: "填充统治者不作任何修改，直接沿用转换器输出的原始设定。"

 IMPERATOR_NOMADS: "帝王游牧民"
 IMPERATOR_NOMADS_TIP: "（需启用“草原可汗”模组方可生效）对于从《英白拉多》转换而来的国家标签，应如何处理其“游牧”属性？默认情况下，所有“迁徙部落”、“草原部落”（Invictus）以及“草原帝国”（Terra-Indomita）均会被转换为“游牧”政体。\n\n注：游牧政体无法进行迁徙，除非其正处于允许迁徙的特定情境下——例如“大草原”情境！"
 IMPERATOR_NOMADS_ONLY_STEPPE: "唯在草原"
 IMPERATOR_NOMADS_ONLY_STEPPE_TIP: "所有经转换器处理后变为“游牧”政体、且位于草原地区以外的《Imperator》标签，均将转换为“部落”政体。"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES: "置之度外，转化草原部落"
 IMPERATOR_NOMADS_LEAVE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "经转换器处理后被设定为“游牧”政体的《Imperator》标签，若其位于草原地区之外，则保持原状不变；若其位于草原地区之内，则会被转换为“游牧”政体。"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES: "不向外扩张，转化草原部落"
 IMPERATOR_NOMADS_NONE_OUTSIDE_CONVERT_STEPPE_TRIBES_TIP: "若经转换器处理后被设定为“游牧”政体的《Imperator》标签位于草原地区之外，则会被转换为“部落”政体；若经转换器处理后被设定为“部落”政体的《Imperator》标签位于草原地区之内，则会被转换为“游牧”政体。"
 IMPERATOR_NOMADS_NO_NOMADS: "无游牧者"
 IMPERATOR_NOMADS_NO_NOMADS_TIP: "所有经转换器处理后变为“游牧”政体的《Imperator》标签，均被设定为“部落”政体。"
 IMPERATOR_NOMADS_NO_CHANGES: "无更改"
 IMPERATOR_NOMADS_NO_CHANGES_TIP: "在“游牧”属性方面，《Imperator》标签未作任何修改，完全沿用转换器输出的结果。"

 MANDALA_RULERS: "曼陀罗尺"
 MANDALA_RULERS_TIP: "（需启用“天下大同”模组方可生效）对于那些符合原版游戏“曼荼罗条件”的统治者，是否应在游戏开局时为其赋予“曼荼罗政体”？\n\n注：基础游戏设定的“曼荼罗”条件要求统治者拥有“有组织的泛神论”信仰，且具备以下文化传承之一：\n- 南岛\n- 泰\n- 孟-高棉\n- 越\n- 印欧雅利安\n- 达罗毗荼\n- 缅\n- 羌"
 MANDALA_RULERS_SEA_FEUDAL: "东南亚 - 封建"
 MANDALA_RULERS_SEA_FEUDAL_TIP: "在东南亚地区符合曼荼罗条件的封建统治者。"
 MANDALA_RULERS_SEA_NONTRIBAL: "东南亚 - 非部落"
 MANDALA_RULERS_SEA_NONTRIBAL_TIP: "在东南亚地区符合曼荼罗条件的所有非部落、瓦努亚或游牧统治者。"
 MANDALA_RULERS_SEA_ALL: "东南亚 - 所有"
 MANDALA_RULERS_SEA_ALL_TIP: "在东南亚地区符合曼荼罗条件的所有统治者，无论其政体如何。"
 MANDALA_RULERS_EVERYWHERE_FEUDAL: "全境 - 封建"
 MANDALA_RULERS_EVERYWHERE_FEUDAL_TIP: "在任何地区符合曼荼罗条件的封建统治者。"
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL: "全境 - 非部落"
 MANDALA_RULERS_EVERYWHERE_NONTRIBAL_TIP: "在任何地区符合曼荼罗条件的所有非部落、瓦努亚或游牧统治者。"
 MANDALA_RULERS_EVERYWHERE_ALL: "全境 - 所有"
 MANDALA_RULERS_EVERYWHERE_ALL_TIP: "在任何地区符合曼荼罗条件的所有统治者，无论其政体如何。"
 MANDALA_RULERS_NONE: "无"
 MANDALA_RULERS_NONE_TIP: "游戏开始时，不会有任何统治者被设定为曼荼罗统治者。"

 RITSURYO_RULERS: "律令统治者"
 RITSURYO_RULERS_TIP: "（需启用“天下大同”规则方可生效）在游戏开局时，是否应有统治者直接获授“日本帝国”及“菊花王朝”头衔？除本选项所设定的条件外，该角色还必须在开局时即为“帝国”级政体，且其首都位于日本境内，并采用“律令”政体类型。若已有统治者在游戏开局时即持有“日本帝国”头衔，则本选项将不产生任何影响。 \n\n注：所有“律令”政体帝国——无论其是在游戏开局时即已存在，还是在游戏过程中新近建立——均将自动获得专属的仪式性君主头衔（例如“菊花王朝”）。此类帝国在开局时默认采用“长子继承法”；一旦其在内战中败于“自由派系”之手，其继承法便将自动变更为“日本摄政继承法”。"
 RITSURYO_RULERS_JAPANESE_JAPAN: "日系传承"
 RITSURYO_RULERS_JAPANESE_JAPAN_TIP: "游戏开始时，日本帝国可能会授予一位首都位于日本且拥有‘日系传承’的律令制皇帝。"
 RITSURYO_RULERS_ANY_JAPAN: "任意传承"
 RITSURYO_RULERS_ANY_JAPAN_TIP: "游戏开始时，日本帝国可能会授予一位首都位于日本的律令制皇帝，无论其拥有何种文化传承。"
 RITSURYO_RULERS_NONE: "无"
 RITSURYO_RULERS_NONE_TIP: "游戏开始时，不会有任何统治者获授日本帝国。"
