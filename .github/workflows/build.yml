name: Build

on:
  pull_request:
    # Avoid running this job if the upload_dev_build_artifact job is going to run,
    # since it will build the same code and we don't want to waste resources building twice.
    types: [reopened]
    paths-ignore:
    - '**/*.md'
    - 'CODEOWNERS'
    - 'LICENSE'
  merge_group:

concurrency:
  group: ci-build-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [[self-hosted, windows], [self-hosted, linux], macos-14]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: "List installed dotnet SDKs"
      if: matrix.os == 'Windows'
      run: dotnet --list-sdks
    - name: "Setup Dotnet for use with actions"
      # don't run on self-hosted Windows
      if: ${{ !contains(toJSON(matrix.os), 'windows') || !contains(toJSON(matrix.os), 'self-hosted') }}
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: "Cache NuGet packages"
      uses: actions/cache@v6
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/global.json', '**/NuGet.Config', '**/nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: "Build converter backend"
      working-directory: ImperatorToCK3
      run: |
        dotnet build
