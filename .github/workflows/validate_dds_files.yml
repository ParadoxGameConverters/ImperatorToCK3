name: "Validate DDS files"

on:
  pull_request:
    paths:
    - '.github/workflows/validate_dds_files.yml'
    - 'ImperatorToCK3/Data_Files/blankMod/output/gfx/interface/icons/faith/**'
    - '.github/workflows/requirements-validate-dds.txt'
    - 'tools/validate_dds_files.py'
  merge_group:

concurrency:
  group: ci-validate-dds-files-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  validate-dds-files:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: '.github/workflows/requirements-validate-dds.txt'
    - uses: mfinelli/setup-imagemagick@v7
      with:
        install-libfuse2: true
    - name: "Install Wand library"
      run: |
        python3 -m venv venv
        source venv/bin/activate
        python3 -m pip install -r .github/workflows/requirements-validate-dds.txt
    - name: "Validate faith icons"
      run: |
        source venv/bin/activate
        python3 ./tools/validate_dds_files.py